{% load static %}
<div>
    <div style="display:flex; flex-direction:row; align-items:center; justify-content:space-between; padding-top:8px;">
        <div style="display:flex; flex-direction:row; align-items:center; font-size:12px; color:#888; gap:4px;">
            <img src="{% if downvoted %} {% static 'post/DownVoteClicked.png' %} {% else %} {% static 'post/DownVote.png' %} {% endif %}" 
                class="static-button" style="mix-blend-mode:multiply;"
                data-action="vote" 
                data-vote="downvote"
                unicorn:click="downvote"/>
            <img src="{% if upvoted %} {% static 'post/UpVoteClicked.png' %} {% else %} {% static 'post/UpVote.png' %} {% endif %}" 
                class="static-button" style="mix-blend-mode:multiply;"
                data-action="vote" 
                data-vote="upvote"
                unicorn:click="upvote"/>
            <span style="margin-left:5px; color:#1FBF82">{{payout}}</span>

            <span style="width:1px; height:16px; background-color:#ccc;"></span>
            <span style="color:#1FBF82">{{total_votes}} votes</span>

            <span style="width:1px; height:16px; background-color:#ccc;"></span>
            <a href="{% url 'posts:post' post.id %}#comments" style="display:flex; align-items:center; gap:4px; text-decoration:none;">
                <img src="{% static 'post/Comments.png' %}" style="width:16px; height:16px; mix-blend-mode:multiply;"/>
                <span style="color:#1FBF82; display:flex; align-items:center; gap:8px; margin-right:4px;">{{total_comments}}</span>
            </a>

            <span style="width:1px; height:16px; background-color:#ccc;"></span>
            <img src="{% if resteemed %} {% static 'post/ReSteemClicked.png' %} {% else %} {% static 'post/ReSteem.png' %} {% endif %}"
                class="static-button" style="mix-blend-mode:multiply; margin-right:4px;"
                data-action="share" alt="ReSteemit Post"
                unicorn:click="toggle_resteem"/>
        </div>
    </div>

    <hr>

    {% if show_own_post_error %}
    <div style="margin-top:5px; width:calc(100% - 24px); border:1px solid #f5c6cb; background-color:#fff3f4; z-index:10; border-radius:12px; padding:12px;">
        <div style="font-size:13px; color:#c0392b; text-align:center; margin-bottom:8px;">
            <span class="fa fa-exclamation-circle" style="margin-right:4px;"></span>
            This is your own post — you cannot ReSteem it!
        </div>
        <div style="text-align:center;">
            <span unicorn:click="close_resteem_error"
                style="cursor:pointer; font-size:12px; color:#888; border:1px solid #ccc; border-radius:8px; padding:3px 12px; background:#fff;">
                Close
            </span>
        </div>
    </div>
    {% endif %}
        
    {% if show_resteem_box %}
    <div style="margin-top:5px; width:calc(100% - 24px); border:1px solid #ddd; background-color:white; z-index:10; border-radius:12px; padding:8px;">
        <div style="width:100%; text-align:center; font-size:14px; font-weight:bold; color:#888; cursor:pointer;"
            class="share-submit" unicorn:click="resteemed_post">
            <span class="fa fa-share" style="margin-right:4px;"></span>Repost to my timeline
        </div>
    </div>
    {% endif %}
</div>
