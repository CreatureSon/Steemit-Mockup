{% load bootstrap4 %}
{% load static %}

<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,
          shrink-to-fit=no">
    <title>Steemit</title>

    {% bootstrap_css %}
    {% bootstrap_javascript jquery='full' %}
    {% load unicorn %}
    {% unicorn_scripts %}
    {% block styles %}
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/participants.css' %}">
    <link rel="stylesheet" href="{% static 'css/posts.css' %}">
    {% endblock styles %}

</head>

<body class="bg-light"
    {% if request.session.joined_at %}
        data-joined-at="{{ request.session.joined_at }}"
    {% endif %}>

    <nav class="navbar navbar-expand-md navbar-light bg-light mb-4 border">

        <a class="navbar-brand" href="{% url 'posts:index' %}">
            <img class="img-fluid" src="{% static 'home/steemit-logo.png' %}" width="125" height="125">
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse"
            aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarCollapse">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'posts:new_post' %}">
                        <img class="img-fluid" src="{% static 'home/create-post.png' %}" width="45" height="45">
                    </a>
                </li>
                <li>
                    <a class="nav-link" href="{% url 'participants:wallet' %}">
                        <img class="img-fluid" src="{% static 'home/steemit-wallet.png' %}" width="40" height="40">
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main role="main" class="bg-light container">
        {% csrf_token %}
        <div class="pb-2 mb-2 border-bottom">
            {% block page_header %}{% endblock page_header %}
        </div>

        <div class="bg-light">
            {% block content %}{% endblock content %}
        </div>
    </main>

    <script src="{% static 'js/timer.js' %}"></script>

</body>

</html>
