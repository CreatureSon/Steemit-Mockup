{% load bootstrap4 %}
{% load static %}

<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,
          shrink-to-fit=no">
    <title>Steemit Participation Pages</title>

    {% bootstrap_css %}
    {% bootstrap_javascript jquery='full' %}
    {% block styles %}
    <link rel="stylesheet" href="{% static 'participants/style.css' %}">
    {% endblock styles %}

</head>

<body class="bg-light">
    <a class="navbar-brand" href="{% url 'posts:index' %}">
        <img class="img-fluid" src="{% static 'home/steemit-logo.png' %}" width="125" height="125">
    </a>

    <main role="main" class="bg-light container">
        <div class="pb-2 mb-2 border-bottom">
            {% block page_header %}{% endblock page_header %}
        </div>

        <div class="bg-light">
            {% block content %}{% endblock content %}
        </div>
    </main>

</body>

</html>
