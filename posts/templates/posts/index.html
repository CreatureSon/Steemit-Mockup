{% extends "posts/base.html" %}
{% load static %}

{% block page_header %}
<div class="jumbotron">
    <h1 class="display-3">Baylor Steemit Mockup</h1>
    <p class="lead">Welcome to the Baylor Steemit Mockup. Our selections are
        minimal, but our flavors are remarkable. Please leave
        a review on your favorite post!
    </p>
</div>

<div class="container">
    <div class="row">
        <div class="col">
            <img src="{% static 'pizza1.jpg' %}" class="img-fluid" alt="Post 1">
        </div>
        <div class="col">
            <img src="{% static 'pizza2.jpg' %}" class="img-fluid" alt="Post 2">
        </div>
        <div class="col">
            <img src="{% static 'building.jpg' %}" class="img-fluid" alt="Post Building">
        </div>
    </div>
</div>
{% endblock page_header %}
